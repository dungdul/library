<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <script src="javascript.js" defer></script>
  <title>Library</title>
</head>
<body>
  <div id="header">
    <h1>Library</h1>
    <button id="add" command="show-modal" commandfor="add-book-dialog">Add a new book</button>
    <dialog id="add-book-dialog">
      <form action="">
        <h1>Add a new book</h1>
        <div class="text-field-container">
          <p>
            <label for="title">Title:</label>
            <input type="text" id="title">
          </p>
          <p>
            <label for="author">Author:</label>
            <input type="text" id="author">
          </p>
          <p>
            <label for="pages">Pages:</label>
            <input type="number" id="pages">
          </p>
        </div>
        <fieldset>
          <legend>Have you read the book?</legend>
          <ul>
            <li>
              <label for="yes">
                <input type="radio" name="read" id="yes" value="yes">
                Yes
              </label>
            </li>
            <li>
              <label for="no">
                <input type="radio" name="read" id="no" value="no">
                No
              </label>
            </li>
          </ul>
        </fieldset>
        <div class="button-container">
          <button id="cancel">Cancel</button>
          <button id="confirm">Confirm</button>
        </div>
      </form>
    </dialog>
  </div>
  <div id="library"></div>
</body>
</html>
